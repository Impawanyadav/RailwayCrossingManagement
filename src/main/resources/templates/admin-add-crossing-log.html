<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{base-layout}">
<head>
    <title>Schedule Crossing Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div layout:fragment="content" class="p-8">
        <div class="flex justify-between items-center border-b-2 border-[#1c7c8c] pb-4 mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Schedule Train Crossing Log</h2>
            <a th:href="@{/admin/dashboard}" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition-colors shadow">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>

        <div class="max-w-2xl bg-white shadow-lg rounded-lg p-8 border border-gray-200">
            <form id="addCrossingLogForm" class="space-y-6">
                <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
                    <div>
                        <label for="crossingId" class="block text-sm font-semibold text-gray-700 mb-1">Crossing ID</label>
                        <input type="number" id="crossingId" required min="1" class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#1c7c8c]">
                    </div>
                    <div>
                        <label for="trainNumber" class="block text-sm font-semibold text-gray-700 mb-1">Train Number</label>
                        <input type="number" id="trainNumber" required min="1" class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#1c7c8c]">
                    </div>
                    <div>
                        <label for="closedFrom" class="block text-sm font-semibold text-gray-700 mb-1">Gate Close From</label>
                        <input type="time" id="closedFrom" required class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#1c7c8c]">
                    </div>
                    <div>
                        <label for="closedTo" class="block text-sm font-semibold text-gray-700 mb-1">Gate Close To</label>
                        <input type="time" id="closedTo" required class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#1c7c8c]">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Active Operating Days</label>
                        <div class="flex flex-wrap gap-2">
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="MONDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Monday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="TUESDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Tuesday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="WEDNESDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Wednesday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="THURSDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Thursday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="FRIDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Friday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="SATURDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Saturday</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="days" value="SUNDAY" class="hidden peer"><span class="px-4 py-2 rounded-full border border-gray-300 text-sm peer-checked:bg-[#1c7c8c] peer-checked:text-white">Sunday</span></label>
                        </div>
                    </div>
                </div>

                <div id="messageBox" class="hidden px-4 py-3 rounded relative shadow-sm" role="alert"></div>

                <div class="flex justify-end pt-6 border-t border-gray-200">
                    <button type="button" id="submitBtn" onclick="submitSchedule()" class="bg-[#1c7c8c] hover:bg-[#15626f] text-white font-bold py-3 px-8 rounded shadow-md transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-calendar-plus"></i> Save Crossing Schedule
                    </button>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="page-scripts">
        <script>
            async function submitSchedule() {
                const messageBox = document.getElementById('messageBox');
                const submitBtn = document.getElementById('submitBtn');
                
                messageBox.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Saving...';

                const selectedDays = [];
                document.querySelectorAll('input[name="days"]:checked').forEach(cb => selectedDays.push(cb.value));

                if (selectedDays.length === 0) {
                    messageBox.className = "bg-red-100 text-red-800 p-4 mb-4 rounded";
                    messageBox.innerHTML = "Error: Please select at least one day.";
                    messageBox.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Save Crossing Schedule';
                    return;
                }

                const payload = {
                    crossingId: parseInt(document.getElementById('crossingId').value),
                    trainNumber: parseInt(document.getElementById('trainNumber').value),
                    days: selectedDays,
                    closedFrom: document.getElementById('closedFrom').value + ":00",
                    closedTo: document.getElementById('closedTo').value + ":00"
                };

                try {
                    const response = await fetch('/api/admin/addCrossingLog', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const responseText = await response.text();
                    if (response.ok) {
                        messageBox.className = "bg-green-100 text-green-800 p-4 mb-4 rounded";
                        messageBox.innerHTML = "Success: " + responseText;
                        document.getElementById('addCrossingLogForm').reset();
                    } else {
                        messageBox.className = "bg-red-100 text-red-800 p-4 mb-4 rounded";
                        messageBox.innerHTML = "Error: " + responseText;
                    }
                } catch (e) {
                    messageBox.className = "bg-red-100 text-red-800 p-4 mb-4 rounded";
                    messageBox.innerHTML = "System Error: Server connection failed.";
                } finally {
                    messageBox.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Save Crossing Schedule';
                }
            }
        </script>
    </th:block>
</body>
</html>
